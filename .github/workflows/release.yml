name: Release Binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0)'
        required: true
        type: string
      use_main:
        description: 'Check out main instead of the tag (use if the tag is broken)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"

    steps:
      # Resolve the version and ref to use throughout the workflow.
      # - On release published: version = tag name, ref = tag
      # - On manual dispatch:   version = input, ref = tag (or main if use_main=true)
      - name: Resolve version and ref
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            if [ "${{ inputs.use_main }}" = "true" ]; then
              REF="main"
            else
              REF="${{ inputs.version }}"
            fi
          else
            VERSION="${{ github.event.release.tag_name }}"
            REF="${{ github.event.release.tag_name }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "ref=${REF}" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Install Node dependencies
        run: cd frontend && npm ci

      # swagger must run before go mod download — docs/api is a local package
      # that doesn't exist until swag generates it; go would try to fetch it from GitHub otherwise
      - name: Build frontend and generate swagger
        run: make frontend-build embed-copy swagger

      - name: Download Go modules
        run: cd server && go mod download

      - name: Build binary
        working-directory: server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BINARY="memex-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}"
          go build \
            -ldflags="-s -w -X main.version=${{ steps.resolve.outputs.version }}" \
            -o "../dist/${BINARY}" \
            ./cmd/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: memex-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    name: Upload artifacts to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Minimal checkout just to satisfy softprops/action-gh-release
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum dist/* > dist/checksums.txt

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.event.release.tag_name }}
          files: dist/*
