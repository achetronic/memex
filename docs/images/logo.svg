    d="
      M 96 44
      C 88 40, 72 38, 58 46
      C 46 52, 36 62, 30 76
      C 24 88, 22 100, 24 114
      C 26 126, 32 138, 42 147
      C 50 155, 62 161, 76 163
      C 84 165, 92 164, 96 161

      C 96 155, 94 148, 96 142
      C 98 136, 96 130, 94 124
      C 92 118, 96 112, 94 106
      C 92 100, 90 94, 94 88
      C 98 82, 96 74, 96 66
      C 96 58, 96 50, 96 44
      Z
    "
    fill="#ffd6e0"
    stroke="#111"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Left cortex folds (gyri) — curvy bumps on the outer edge -->
  <path d="M 58 56 C 48 66, 40 78, 38 92" fill="none" stroke="#111" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M 34 100 C 30 114, 34 128, 42 140" fill="none" stroke="#111" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M 52 152 C 62 160, 76 164, 88 162" fill="none" stroke="#111" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M 68 50 C 72 64, 68 80, 64 94" fill="none" stroke="#111" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M 42 118 C 50 130, 62 140, 76 146" fill="none" stroke="#111" stroke-width="4.5" stroke-linecap="round"/>

  <!-- RIGHT HEMISPHERE — mirror of left, shifted right with a gap -->
  <path
    d="
      M 124 44
      C 132 40, 148 38, 162 46
      C 174 52, 184 62, 190 76
      C 196 88, 198 100, 196 114
      C 194 126, 188 138, 178 147
      C 170 155, 158 161, 144 163
      C 136 165, 128 164, 124 161

      C 124 155, 126 148, 124 142
      C 122 136, 124 130, 126 124
      C 128 118, 124 112, 126 106
      C 128 100, 130 94, 126 88
      C 122 82, 124 74, 124 66
      C 124 58, 124 50, 124 44
      Z
    "
    fill="#ffd6e0"
    stroke="#111"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
