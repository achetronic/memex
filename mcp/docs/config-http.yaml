# memex-mcp — HTTP mode with JWT auth and policies
# Use this for production deployments accessible by multiple agents

server:
  name: "memex-mcp"
  version: "0.1.0"
  transport:
    type: "http"
    http:
      host: ":8090"

memex:
  base_url: "${MEMEX_BASE_URL}"
  default_namespace: ""   # override per-request via the namespace tool parameter
  auth:
    # forward_api_key: if true, memex-mcp forwards the X-Memex-Api-Key header
    # from the agent's request verbatim to the Memex API. Requires JWT auth
    # to be enabled — without it any caller could inject an arbitrary key.
    forward_api_key: true

    # namespace_keys: static API keys per namespace, used when no forwarded key
    # is present. Use "*" as a catch-all fallback.
    namespace_keys:
      facturas: "${MEMEX_KEY_FACTURAS}"
      contratos: "${MEMEX_KEY_CONTRATOS}"
      "*": "${MEMEX_KEY_DEFAULT}"

middleware:
  access_logs:
    excluded_headers:
      - "Accept"
      - "Accept-Encoding"
    redacted_headers:
      - "Authorization"
      - "Cookie"

  jwt:
    enabled: true
    jwks_uri: "https://your-idp.com/.well-known/jwks.json"
    cache_interval: 5m
    allow_conditions:
      - expression: 'has(payload.scope) && payload.scope.contains("memex:read")'

# Tool + namespace access policies based on JWT claims.
# Rules are evaluated in order — the first matching expression wins.
# Within a matching rule, allowed_tools AND allowed_namespaces are both enforced.
# An empty list means no restriction on that dimension.
policies:
  rules:
    # Admins can use all tools across all namespaces.
    - expression: 'has(payload.groups) && payload.groups.exists(g, g == "admins")'
      allowed_tools: ["*"]
      allowed_namespaces: ["*"]

    # Agents with memex:write scope can write to their own namespace (sub claim).
    - expression: 'has(payload.scope) && payload.scope.contains("memex:write") && has(payload.sub)'
      allowed_tools:
        - "upload_document"
        - "delete_document"
        - "list_documents"
        - "get_document"
        - "search"
        - "health"
      allowed_namespaces:
        - "${payload.sub}"   # evaluated at runtime by the policy engine

    # Agents with memex:read scope can only read their own namespace.
    - expression: 'has(payload.scope) && payload.scope.contains("memex:read") && has(payload.sub)'
      allowed_tools:
        - "list_documents"
        - "get_document"
        - "search"
        - "health"
      allowed_namespaces:
        - "${payload.sub}"   # evaluated at runtime by the policy engine

oauth_authorization_server:
  enabled: true
  url_suffix: ""
  issuer_uri: "https://your-idp.com"

oauth_protected_resource:
  enabled: true
  url_suffix: ""
  resource: "https://your-memex-mcp.example.com"
  auth_servers:
    - "https://your-idp.com"
  jwks_uri: "https://your-idp.com/.well-known/jwks.json"
  scopes_supported:
    - "memex:read"
    - "memex:write"
  bearer_methods_supported:
    - "header"
  resource_name: "Memex MCP Server"
  resource_documentation: "https://github.com/achetronic/memex"
