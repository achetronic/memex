  <path d="M 152 50 C 148 64, 152 80, 156 94" fill="none" stroke="#111" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M 178 118 C 170 130, 158 140, 144 146" fill="none" stroke="#111" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Name -->
  <text
    x="110" y="188"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="16"
    font-weight="700"
    letter-spacing="5"
