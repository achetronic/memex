name: Docker MCP Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag (e.g. v0.2.0)"
        required: true
        type: string
      use_main:
        description: "Check out main instead of the tag (use if the tag is broken)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build and push memex-mcp Docker image
    runs-on: ubuntu-latest

    steps:
      # Resolve the version and ref to use throughout the workflow.
      # - On release published: version = tag name, ref = tag
      # - On manual dispatch:   version = input, ref = tag (or main if use_main=true)
      - name: Resolve version and ref
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            if [ "${{ inputs.use_main }}" = "true" ]; then
              REF="main"
            else
              REF="${{ inputs.version }}"
            fi
          else
            VERSION="${{ github.event.release.tag_name }}"
            REF="${{ github.event.release.tag_name }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "ref=${REF}" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/achetronic/memex-mcp
          tags: |
            type=raw,value=${{ steps.resolve.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./mcp
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.resolve.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
