       C 70,13  73,11  75,14
       C 77,17  76,21  73,23
       C 70,25  67,24  65,21

       C 63,18  60,16  58,18
       C 56,20  57,24  60,25
       C 63,26  66,24  67,21
       C 68,18  67,14  64,13
       C 61,12  58,14  58,17"
    fill="none"
    stroke="#2d1f2a"
    stroke-width="1.4"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- OJO -->
  <polygon points="90,18  97,22  90,26  83,22"
    fill="#2d1f2a" stroke="none"/>
  <circle cx="90" cy="22" r="2.2" fill="#fff0f3" stroke="none"/>
  <circle cx="90" cy="22" r="1.0" fill="#2d1f2a" stroke="none"/>

  </g>

