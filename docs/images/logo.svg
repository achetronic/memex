  <!-- Right cortex folds (gyri) -->
  <path d="M 162 56 C 172 66, 180 78, 182 92" fill="none" stroke="#111" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M 186 100 C 190 114, 186 128, 178 140" fill="none" stroke="#111" stroke-width="4.5" stroke-linecap="round"/>
